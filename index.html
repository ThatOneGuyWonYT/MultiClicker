<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiClicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">
        <h1 id="score">0</h1>
        <p>Power: <span id="pwr">1</span> | Auto: <span id="aps">0</span>/s</p>
    </div>

    <button id="clicker">CLICK</button>

    <div id="shop">
        <button onclick="buy(0)">
            <b>Intern</b><br>+1 Auto | Cost: <span id="c0">50</span>
        </button>
        <button onclick="buy(1)">
            <b>Energy Drink</b><br>+1 Power | Cost: <span id="c1">15</span>
        </button>
        <button onclick="buy(2)">
            <b>Botnet</b><br>+10 Auto | Cost: <span id="c2">500</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
