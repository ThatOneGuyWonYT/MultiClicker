<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>multiclicker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="layout">
        <section class="game-area">
            <div class="hud">
                <div id="score">0</div>
                <div class="stats">
                    power: <span id="pwr">1</span> | auto: <span id="aps">0</span>
                </div>
            </div>
            
            <div id="button-dock">
                </div>
        </section>

        <aside class="sidebar">
            <div class="shop-header">shop</div>
            <div id="shop-list">
                </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
