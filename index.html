<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiClicker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="layout">
        
        <section class="game-area">
            <div class="hud">
                <div id="score">0</div>
                <div class="stats">
                    power: <span id="pwr">1</span> | auto: <span id="aps">0</span>
                </div>
            </div>
            
            <div id="button-dock"></div>
        </section>

        <aside class="sidebar">
            <div class="shop-header">Shop</div>

            <div id="shop-list"></div>

            <div class="rebirth-panel">
                <div class="rebirth-stat">rebirths: <span id="rebirth-count">0</span></div>
                <button id="rebirth-btn" class="rebirth-btn" onclick="doRebirth()">
                    rebirth ($1.0m)
                </button>
                <div class="rebirth-hint">resets score for permanent power</div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
