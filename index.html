<!DOCTYPE html>
<html>
<head>
    <title>MultiClicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="stats">
        <h1 id="score">0</h1>
        <p>CPS: <span id="auto-rate">0</span> | Power: <span id="per-click">1</span></p>
    </section>

    <div id="click-zone">
        <button id="main-btn">TAP</button>
    </div>

    <div id="shop">
        <button class="item" id="buy-intern">
            <b>Underpaid Intern</b><br>
            Clicks once per sec. Cost: <span id="c1">50</span>
        </button>

        <button class="item" id="buy-energy">
            <b>Questionable Energy Drink</b><br>
            +1 click power. Cost: <span id="c2">15</span>
        </button>

        <button class="item" id="buy-botnet">
            <b>Local Botnet</b><br>
            Huge auto-click boost. Cost: <span id="c3">500</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
