<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiClicker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="layout">
        <section class="viewport">
            <div class="hud">
                <div id="score">0</div>
                <div class="stats">Power: <span id="pwr">1</span> | Auto: <span id="aps">0</span></div>
            </div>
            
            <div class="btn-box">
                <img src="ClickerArt/Button.png" id="main-btn" draggable="false">
            </div>
        </section>

        <aside class="sidebar">
            <div class="shop-banner">Upgrades</div>
            <div id="shop-list"></div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
